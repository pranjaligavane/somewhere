<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="somewhere — release thoughts anonymously. a stranger may find them.">
  <meta name="theme-color" content="#c9e8f7">
  <title>somewhere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-sky">

  <canvas id="atmo-canvas" aria-hidden="true"></canvas>
  <div class="film-grain" aria-hidden="true"></div>

  <!-- SCREEN: LANDING -->
  <div id="screen-landing" class="screen active">
    <div class="landing-center">
      <p class="site-eyebrow">a place for quiet thoughts</p>
      <h1 class="site-name">somewhere</h1>
      <p class="site-tagline" id="landing-tagline">Some thoughts were meant to fly.</p>
      <div class="landing-actions">
        <button class="action-btn" id="btn-send">
          <span class="action-icon" id="send-icon">✈</span>
          <span class="action-text" id="send-label">Fold a plane</span>
        </button>
        <span class="action-or">or</span>
        <button class="action-btn ghost" id="btn-receive">
          <span class="action-icon" id="receive-icon">⊹</span>
          <span class="action-text" id="receive-label">Catch one from the sky</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Theme Switcher -->
  <div class="theme-wrap" id="theme-wrap">
    <button class="theme-toggle" id="theme-toggle" aria-label="Change atmosphere">
      <span class="theme-orb"></span>
    </button>
    <div class="theme-menu" id="theme-menu">
      <button class="theme-opt active" data-theme="sky" title="Wind">
        <span>✈</span><small>wind</small>
      </button>
      <button class="theme-opt" data-theme="rain" title="Rain">
        <span>𖹭</span><small>rain</small>
      </button>
      <button class="theme-opt" data-theme="ocean" title="Ocean">
        <span>⚓︎</span><small>ocean</small>
      </button>
      <button class="theme-opt" data-theme="night" title="Nova">
        <span>✦</span><small>nova</small>
      </button>
    </div>
  </div>

  <!-- SCREEN: WRITE -->
  <div id="screen-write" class="screen">
    <button class="back-btn" id="back-write" aria-label="Go back">←</button>
    <div class="write-wrap">
      <p class="write-prompt" id="write-prompt">Write something the world can carry.</p>
      <div class="paper-surface">
        <textarea id="msg-input" placeholder="A stranger may someday read this..." maxlength="500"
          spellcheck="false"></textarea>
        <div class="char-count"><span id="char-left">500</span></div>
      </div>
      <button class="release-btn" id="btn-release">
        <span id="release-label">release into the sky</span>
      </button>
    </div>
  </div>

  <!-- SCREEN: SENDING ANIMATION -->
  <div id="screen-sending" class="screen">
    <canvas id="send-canvas"></canvas>
    <p class="anim-caption" id="send-caption">Carried by the wind.</p>
  </div>

  <!-- SCREEN: RECEIVING ANIMATION -->
  <div id="screen-receiving" class="screen">
    <canvas id="receive-canvas"></canvas>
    <p class="anim-caption" id="receive-caption">Something is drifting your way…</p>
    <button class="tap-hint" id="tap-open" style="display:none">tap to open</button>
  </div>

  <!-- SCREEN: READ MESSAGE -->
  <div id="screen-read" class="screen">
    <div class="read-wrap">
      <p class="read-note" id="read-note">This found its way to you.</p>
      <div class="message-letter" id="msg-letter">
        <p class="message-text" id="msg-display"></p>
      </div>
      <button class="letgo-btn" id="btn-letgo">let it go ↑</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
